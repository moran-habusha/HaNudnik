<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>פלטת צבעים</title>
  <style>
    body { background: #f3f4f6; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .palette { display: flex; gap: 20px; background: white; padding: 32px; border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .swatch { text-align: center; }
    .circle { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 10px; }
    .name { font-size: 13px; font-weight: 600; color: #374151; margin: 0 0 2px; }
    .hex { font-size: 11px; color: #9ca3af; margin: 0; }
  </style>
</head>
<body>
  <div class="palette">
    <div class="swatch">
      <div class="circle" style="background:#C7CEEA;"></div>
      <p class="name">לבנדר</p>
      <p class="hex">#C7CEEA</p>
    </div>
    <div class="swatch">
      <div class="circle" style="background:#B5EAD7;"></div>
      <p class="name">מנטה</p>
      <p class="hex">#B5EAD7</p>
    </div>
    <div class="swatch">
      <div class="circle" style="background:#A8D8EA;"></div>
      <p class="name">תכלת</p>
      <p class="hex">#A8D8EA</p>
    </div>
    <div class="swatch">
      <div class="circle" style="background:#FFD9A0;"></div>
      <p class="name">שמנת</p>
      <p class="hex">#FFD9A0</p>
    </div>
    <div class="swatch">
      <div class="circle" style="background:#FFF5B1;"></div>
      <p class="name">צהוב</p>
      <p class="hex">#FFF5B1</p>
    </div>
  </div>
</body>
</html>
