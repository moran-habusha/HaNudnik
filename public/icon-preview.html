<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icon Preview</title>
  <style>
    body {
      margin: 0;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* Phone frame */
    .phone {
      width: 320px;
      background: #111827;
      border-radius: 48px;
      padding: 16px;
      box-shadow: 0 0 0 2px #374151, 0 30px 80px rgba(0,0,0,0.8);
    }

    .phone-screen {
      background: #1c1c1e;
      border-radius: 36px;
      overflow: hidden;
      padding: 48px 24px 32px;
    }

    /* Status bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 8px 24px;
      color: white;
      font-size: 12px;
      font-weight: 600;
    }

    /* Wallpaper area */
    .wallpaper {
      background: linear-gradient(135deg, #1e3a5f 0%, #0f2027 100%);
      border-radius: 24px;
      padding: 48px 24px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }

    /* App icon row */
    .app-row {
      display: flex;
      gap: 24px;
      justify-content: center;
      align-items: flex-start;
    }

    .app-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 72px;
    }

    .app-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    .app-icon img, .app-icon svg {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .app-icon.placeholder {
      background: #374151;
    }

    .app-name {
      color: white;
      font-size: 10px;
      text-align: center;
      line-height: 1.2;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
      font-weight: 400;
    }

    /* Dock */
    .dock {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 14px 20px;
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .dock .app-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="phone-screen">
      <div class="status-bar">
        <span>13:05</span>
        <span>●●●</span>
      </div>
      <div class="wallpaper">
        <!-- Row 1: HaNudnik centered -->
        <div class="app-row">
          <div class="app-item"><div class="app-icon placeholder"></div><span class="app-name"></span></div>
          <div class="app-item">
            <div class="app-icon">
              <img src="icon-192.png" alt="HaNudnik"/>
            </div>
            <span class="app-name">HaNudnik</span>
          </div>
          <div class="app-item"><div class="app-icon placeholder"></div><span class="app-name"></span></div>
        </div>

        <!-- Row 2: placeholders -->
        <div class="app-row">
          <div class="app-item"><div class="app-icon placeholder"></div><span class="app-name"></span></div>
          <div class="app-item"><div class="app-icon placeholder"></div><span class="app-name"></span></div>
          <div class="app-item"><div class="app-icon placeholder"></div><span class="app-name"></span></div>
        </div>

        <!-- Row 3: placeholders -->
        <div class="app-row">
          <div class="app-item"><div class="app-icon placeholder"></div><span class="app-name"></span></div>
          <div class="app-item"><div class="app-icon placeholder"></div><span class="app-name"></span></div>
          <div class="app-item"><div class="app-icon placeholder"></div><span class="app-name"></span></div>
        </div>

        <!-- Dock -->
        <div class="dock">
          <div class="app-icon placeholder" style="width:52px;height:52px;border-radius:14px;"></div>
          <div class="app-icon placeholder" style="width:52px;height:52px;border-radius:14px;"></div>
          <div class="app-icon placeholder" style="width:52px;height:52px;border-radius:14px;"></div>
          <div class="app-icon placeholder" style="width:52px;height:52px;border-radius:14px;"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
