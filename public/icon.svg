<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 820" width="700" height="820">
  <defs>
    <linearGradient id="bodyGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#5b21b6"/>
    </linearGradient>
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#4c1d95" flood-opacity="0.35"/>
    </filter>
    <filter id="bubbleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#4c1d95" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- ===== BUBBLE TOP-LEFT: Sink + dishes + water drops ===== -->
  <g filter="url(#bubbleShadow)">
    <rect x="52" y="148" width="120" height="120" rx="22" fill="url(#bubbleGrad)"/>
  </g>
  <!-- tail pointing right -->
  <polygon points="170,198 196,210 170,222" fill="#5b21b6"/>
  <!-- badge -->
  <circle cx="162" cy="158" r="19" fill="#ef4444"/>
  <text x="162" y="165" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">1</text>
  <!-- sink basin -->
  <rect x="76" y="220" width="72" height="30" rx="8" fill="white" opacity="0.95"/>
  <!-- faucet pipe vertical -->
  <rect x="106" y="183" width="9" height="28" rx="4" fill="white" opacity="0.95"/>
  <!-- faucet arm horizontal -->
  <rect x="94" y="181" width="34" height="9" rx="4" fill="white" opacity="0.95"/>
  <!-- water drops -->
  <ellipse cx="107" cy="216" rx="4" ry="6" fill="#93c5fd"/>
  <ellipse cx="116" cy="213" rx="3.5" ry="5.5" fill="#60a5fa"/>
  <!-- dish 1 -->
  <rect x="82" y="208" width="16" height="18" rx="3" fill="#c4b5fd"/>
  <!-- dish 2 -->
  <rect x="101" y="206" width="16" height="20" rx="3" fill="#ddd6fe"/>
  <!-- cup -->
  <rect x="120" y="210" width="12" height="16" rx="3" fill="#c4b5fd"/>

  <!-- ===== BUBBLE TOP-RIGHT: Laundry basket ===== -->
  <g filter="url(#bubbleShadow)">
    <rect x="528" y="148" width="120" height="120" rx="22" fill="url(#bubbleGrad)"/>
  </g>
  <polygon points="530,198 504,210 530,222" fill="#5b21b6"/>
  <circle cx="538" cy="158" r="19" fill="#ef4444"/>
  <text x="538" y="165" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">1</text>
  <!-- basket body -->
  <rect x="558" y="210" width="72" height="46" rx="8" fill="white" opacity="0.95"/>
  <!-- basket vertical lines -->
  <line x1="575" y1="210" x2="575" y2="256" stroke="#7c3aed" stroke-width="3.5" opacity="0.6"/>
  <line x1="592" y1="210" x2="592" y2="256" stroke="#7c3aed" stroke-width="3.5" opacity="0.6"/>
  <line x1="609" y1="210" x2="609" y2="256" stroke="#7c3aed" stroke-width="3.5" opacity="0.6"/>
  <!-- basket handle -->
  <path d="M 562 212 Q 594 182 626 212" fill="none" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.95"/>

  <!-- ===== BUBBLE BOTTOM-LEFT: Washing machine (centered) ===== -->
  <g filter="url(#bubbleShadow)">
    <rect x="52" y="368" width="120" height="120" rx="22" fill="url(#bubbleGrad)"/>
  </g>
  <polygon points="170,418 196,430 170,442" fill="#5b21b6"/>
  <circle cx="162" cy="378" r="19" fill="#ef4444"/>
  <text x="162" y="385" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">1</text>
  <!-- machine body — centered in bubble -->
  <rect x="76" y="388" width="72" height="82" rx="7" fill="white" opacity="0.95"/>
  <!-- top bar with buttons -->
  <rect x="76" y="388" width="72" height="18" rx="7" fill="#ede9fe" opacity="0.9"/>
  <circle cx="92" cy="397" r="4" fill="#7c3aed"/>
  <circle cx="106" cy="397" r="4" fill="#a78bfa"/>
  <!-- drum circle — centered -->
  <circle cx="112" cy="432" r="24" fill="#ede9fe" stroke="#7c3aed" stroke-width="4"/>
  <circle cx="112" cy="432" r="16" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="6 4"/>

  <!-- ===== BUBBLE BOTTOM-RIGHT: Broom (realistic) ===== -->
  <g filter="url(#bubbleShadow)">
    <rect x="528" y="368" width="120" height="120" rx="22" fill="url(#bubbleGrad)"/>
  </g>
  <polygon points="530,418 504,430 530,442" fill="#5b21b6"/>
  <circle cx="538" cy="378" r="19" fill="#ef4444"/>
  <text x="538" y="385" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">1</text>
  <!-- handle -->
  <line x1="600" y1="382" x2="572" y2="458" stroke="#d97706" stroke-width="9" stroke-linecap="round"/>
  <!-- broom head base -->
  <path d="M 556 450 Q 588 444 606 452 L 604 472 Q 578 480 558 470 Z" fill="#fbbf24"/>
  <!-- bristles -->
  <line x1="561" y1="468" x2="558" y2="483" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="568" y1="471" x2="566" y2="487" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="575" y1="473" x2="574" y2="489" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="582" y1="474" x2="582" y2="490" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="589" y1="473" x2="590" y2="489" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="596" y1="470" x2="598" y2="486" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="603" y1="466" x2="606" y2="481" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
  <!-- binding strip -->
  <rect x="558" y="454" width="48" height="8" rx="3" fill="#b45309" opacity="0.7"/>

  <!-- ===== MAIN CHARACTER ===== -->
  <g filter="url(#shadow)">
    <!-- Chimney -->
    <rect x="362" y="62" width="26" height="68" rx="7" fill="#6d28d9"/>
    <!-- Roof triangle -->
    <polygon points="350,80 200,230 500,230" fill="url(#bodyGrad)"/>
    <!-- Body -->
    <rect x="195" y="218" width="310" height="290" rx="50" fill="url(#bodyGrad)"/>
    <!-- Feet -->
    <ellipse cx="270" cy="520" rx="36" ry="22" fill="#6d28d9"/>
    <ellipse cx="430" cy="520" rx="36" ry="22" fill="#6d28d9"/>
  </g>

  <!-- White face area -->
  <ellipse cx="350" cy="360" rx="118" ry="108" fill="white" opacity="0.97"/>

  <!-- ===== GLASSES ===== -->
  <!-- Left lens (open eye — character's right, viewer's left) -->
  <rect x="248" y="318" width="86" height="72" rx="22" fill="white" stroke="#111" stroke-width="9"/>
  <!-- Right lens (winking — character's left, viewer's right) -->
  <rect x="366" y="318" width="86" height="72" rx="22" fill="white" stroke="#111" stroke-width="9"/>
  <!-- Bridge -->
  <line x1="334" y1="352" x2="366" y2="352" stroke="#111" stroke-width="9" stroke-linecap="round"/>
  <!-- Left arm -->
  <line x1="248" y1="350" x2="222" y2="345" stroke="#111" stroke-width="9" stroke-linecap="round"/>
  <!-- Right arm -->
  <line x1="452" y1="350" x2="478" y2="345" stroke="#111" stroke-width="9" stroke-linecap="round"/>

  <!-- Open eye (left lens) -->
  <circle cx="291" cy="354" r="24" fill="#111"/>
  <circle cx="302" cy="343" r="8" fill="white" opacity="0.6"/>

  <!-- Winking eye (right lens) — raised to align with middle of open eye (y=354) -->
  <path d="M 374 354 Q 409 336 450 354" fill="none" stroke="#111" stroke-width="9" stroke-linecap="round"/>

  <!-- Smile -->
  <path d="M 308 408 Q 350 436 392 408" fill="none" stroke="#333" stroke-width="7" stroke-linecap="round"/>

  <!-- ===== TEXT ===== -->
  <text x="350" y="628" font-family="Arial Black, Arial, sans-serif" font-size="70" font-weight="900" fill="#4c1d95" text-anchor="middle">HaNudnik</text>
</svg>
